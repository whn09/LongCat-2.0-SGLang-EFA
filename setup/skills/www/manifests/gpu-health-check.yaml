# GPU health-check DaemonSet — 开机 nvidia-smi 探测, 失败给节点打 taint 阻止调度
# 移植自 aws-samples/sample-eks-enterprise-quickstart
#   terraform/modules/eks-gpu-stack/main.tf (standard 模式) 的 kubernetes_daemon_set_v1 定义
# 自建 K8s 改动: 去掉 nodeSelector workload-type=gpu (本集群全是 GPU 节点)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-health-check
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gpu-health-check
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gpu-health-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gpu-health-check
subjects:
  - kind: ServiceAccount
    name: gpu-health-check
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-health-check
  namespace: kube-system
  labels:
    app.kubernetes.io/name: gpu-health-check
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-health-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-health-check
    spec:
      hostPID: true                      # nsenter 进宿主机命名空间执行 nvidia-smi
      serviceAccountName: gpu-health-check
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: CriticalAddonsOnly
          operator: Exists
      priorityClassName: system-node-critical
      containers:
        # alpine/k8s: 多架构, 自带 kubectl + util-linux(nsenter), 可匿名拉取
        # (eks-gpu-stack 注: amazonlinux:2023 / bitnami/kubectl 均不可用)
        - name: probe
          image: docker.io/alpine/k8s:1.31.4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - /bin/sh
            - -c
            - |
              set -u
              if nsenter -t 1 -m -p -- nvidia-smi -L >/tmp/smi.log 2>&1; then
                  echo "[gpu-health-check] PASS: nvidia-smi -L on ${NODE_NAME}"
                  cat /tmp/smi.log
                  kubectl taint node "${NODE_NAME}" gpu-unhealthy- 2>/dev/null || true
              else
                  echo "[gpu-health-check] FAIL: nvidia-smi on ${NODE_NAME}"
                  cat /tmp/smi.log
                  kubectl taint node "${NODE_NAME}" gpu-unhealthy=true:NoSchedule --overwrite || true
              fi
              while true; do sleep 3600; done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
