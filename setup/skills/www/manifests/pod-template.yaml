# SGLang 推理 Pod 模板 — 每节点 1 个 Pod 整机独占
# 复制 4 份 (2P2D): prefill-node0/1, decode-node0/1
# 只改: metadata.name + nodeSelector.kubernetes.io/hostname
#
# 启动方式: Pod 起来后 kubectl exec 进容器跑 scripts/launch-2p2d.sh
#   kubectl exec prefill-node0 -- bash -c \
#     "nohup bash /data/scripts/launch-2p2d.sh prefill 0 <P_MASTER_IP> > /data/logs/prefill0.log 2>&1 &"
apiVersion: v1
kind: Pod
metadata:
  name: prefill-node0            # 按角色/序号改
spec:
  nodeSelector:
    kubernetes.io/hostname: node0   # 按目标节点改; 自建集群没有 instance-type 标签
  hostNetwork: true              # PD 分离要求 Pod 以节点 IP 互访
  hostIPC: true                  # NVLink/NVSwitch IPC
  restartPolicy: Never
  containers:
  - name: sglang
    image: public.ecr.aws/n3l4x8f3/sglang-mooncake-uccl:2026.05.02-h200.dp16
    command: ["sleep", "infinity"]   # exec 启服务便于调试; 生产可改 entrypoint
    securityContext:
      privileged: true
      capabilities:
        add: ["IPC_LOCK"]        # RDMA pinned memory
    resources:
      requests:
        nvidia.com/gpu: 8
        vpc.amazonaws.com/efa: 16
        memory: "1500Gi"         # p5en 2TB 内存留系统余量
        cpu: "180"               # 192 vCPU 留 ~10 给系统组件
      limits:
        nvidia.com/gpu: 8
        vpc.amazonaws.com/efa: 16
        memory: "1500Gi"
        cpu: "180"
    volumeMounts:
    - name: models
      mountPath: /models         # 模型权重 (本地 NVMe RAID0)
    - name: data
      mountPath: /data           # 日志/JIT 缓存持久化 (EBS)
    - name: shm
      mountPath: /dev/shm
  volumes:
  - name: models
    hostPath:
      path: /mnt/nvme/models
  - name: data
    hostPath:
      path: /data
  - name: shm
    emptyDir:
      medium: Memory
      sizeLimit: "512Gi"
