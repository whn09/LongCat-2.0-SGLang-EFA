AWSTemplateFormatVersion: '2010-09-09'
Description: >
  p5en.48xlarge Capacity Block inference cluster.
  17 NICs = 1 ENA primary (card0/dev0) + 16 EFA-only (card0/dev1 + card1-15/dev0),
  1TB gp3 root + 2TB gp3 data, cluster placement group, self-referencing SG,
  SSM + ECR IAM role. UserData: mount /data (EBS), RAID0 NVMe, pin EFA installer.

Parameters:
  ClusterName:
    Type: String
    Default: p5en-inference
    Description: Resource name prefix
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet in the SAME AZ as the Capacity Block reservation
  CapacityReservationId:
    Type: String
    AllowedPattern: '^cr-[0-9a-f]+$'
    Description: Capacity Block reservation id (cr-xxxx)
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: >
      AL2023 Base Deep Learning AMI (NVIDIA driver + EFA + Docker). Lookup:
      aws ssm get-parameter --name /aws/service/deeplearning/ami/x86_64/base-oss-nvidia-driver-gpu-amazon-linux-2023/latest/ami-id
  KeyName:
    Type: String
    Default: ''
    Description: EC2 key pair name (empty = no SSH key)
  InstanceCount:
    Type: Number
    Default: 8
    AllowedValues: [2, 4, 6, 8]
    Description: Number of p5en nodes (4 for 2P2D test, 8 for full CB batch)
  RootVolumeSize:
    Type: Number
    Default: 1024
  DataVolumeSize:
    Type: Number
    Default: 2048
  DataVolumeIops:
    Type: Number
    Default: 16000
  DataVolumeThroughput:
    Type: Number
    Default: 1000
  EfaInstallerVersion:
    Type: String
    Default: 1.48.0
  AllowedSshCidr:
    Type: String
    Default: ''
    Description: CIDR allowed to SSH (empty = no SSH ingress rule)

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  HasSshCidr: !Not [!Equals [!Ref AllowedSshCidr, '']]
  Create3: !Or [!Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 6], !Equals [!Ref InstanceCount, 8]]
  Create5: !Or [!Equals [!Ref InstanceCount, 6], !Equals [!Ref InstanceCount, 8]]
  Create7: !Equals [!Ref InstanceCount, 8]

Resources:
  # -------------------------------------------------------------
  # IAM
  # -------------------------------------------------------------
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ClusterName}-node-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  NodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ClusterName}-node-profile'
      Roles: [!Ref NodeRole]

  # -------------------------------------------------------------
  # Security Group: EFA requires self-referencing allow-all
  # -------------------------------------------------------------
  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: p5en nodes with EFA - self-referencing all traffic
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: outbound internet
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-node-sg' }

  NodeSgSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: '-1'
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      Description: EFA/NCCL/K8s self-allow all

  NodeSgSelfEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: '-1'
      DestinationSecurityGroupId: !Ref NodeSecurityGroup
      Description: EFA self-egress (required by EFA docs)

  NodeSgSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshCidr
    Properties:
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowedSshCidr
      Description: SSH from bastion

  # -------------------------------------------------------------
  # Placement group (cluster strategy for EFA low latency)
  # -------------------------------------------------------------
  ClusterPlacementGroup:
    Type: AWS::EC2::PlacementGroup
    Properties:
      Strategy: cluster

  # -------------------------------------------------------------
  # Launch Template: CB market options + reservation target +
  # 16x EFA NICs + 1TB root + 2TB data
  # -------------------------------------------------------------
  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${ClusterName}-p5en-lt'
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: p5en.48xlarge
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
        IamInstanceProfile:
          Name: !Ref NodeInstanceProfile
        InstanceMarketOptions:
          MarketType: capacity-block
        CapacityReservationSpecification:
          CapacityReservationTarget:
            CapacityReservationId: !Ref CapacityReservationId
        Placement:
          GroupName: !Ref ClusterPlacementGroup
          Tenancy: default
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
          HttpEndpoint: enabled
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref RootVolumeSize
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
          - DeviceName: /dev/xvdb
            Ebs:
              VolumeSize: !Ref DataVolumeSize
              VolumeType: gp3
              Iops: !Ref DataVolumeIops
              Throughput: !Ref DataVolumeThroughput
              Encrypted: true
              DeleteOnTermination: true
        # p5en.48xlarge 官方推荐布局 (efa-acc-inst-types.html):
        #   card0/dev0 = ENA 主网卡 (主网卡不能是 efa-only)
        #   card0/dev1 = efa-only  <- 容易漏! card0 也承载一个 EFA 设备
        #   card1-15/dev0 = efa-only x15; 合计 1 ENA + 16 EFA
        NetworkInterfaces:
          - NetworkCardIndex: 0
            DeviceIndex: 0
            InterfaceType: interface
            SubnetId: !Ref SubnetId
            Groups: [!Ref NodeSecurityGroup]
            DeleteOnTermination: true
            # ⚠️ EC2 硬限制: 多网卡启动不允许 associatePublicIPAddress(API 400),
            # 且忽略子网 MapPublicIpOnLaunch → 节点开机时无公网 IP。
            # 出网必须二选一: ①子网路由走 NAT Gateway(推荐) ②开机后给主 ENI 挂 EIP。
            # 无出网时 userdata 装 mdadm 会失败(已有 30x10s 重试+脚本 fail-fast 兜底)。
          - { NetworkCardIndex: 0,  DeviceIndex: 1, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 1,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 2,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 3,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 4,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 5,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 6,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 7,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 8,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 9,  DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 10, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 11, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 12, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 13, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 14, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
          - { NetworkCardIndex: 15, DeviceIndex: 0, InterfaceType: efa-only, SubnetId: !Ref SubnetId, Groups: [!Ref NodeSecurityGroup], DeleteOnTermination: true }
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - { Key: Name, Value: !Sub '${ClusterName}-p5en-node' }
              - { Key: Project, Value: !Ref ClusterName }
          - ResourceType: volume
            Tags:
              - { Key: Name, Value: !Sub '${ClusterName}-p5en-volume' }
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # p5en node bootstrap (container-only, no K8s):
            #   [1] /data = EBS xfs (persistent)
            #   [2] install self-heal systemd service: EVERY boot rebuilds local NVMe RAID0
            #       and bind-mounts /var/lib/docker + /var/lib/containerd onto it
            #       (local instance-store is wiped on stop/start, so this restores the fast
            #        disk layout automatically; the data itself is ephemeral)
            #   [3] EFA userspace (pinned)
            #   [4] nvidia runtime for docker+containerd
            set -ex
            exec > >(tee /var/log/p5en-bootstrap.log) 2>&1

            echo "=== [1/4] EBS data disk -> /data ==="
            DATA_DISK=""
            for i in $(seq 1 60); do
              for sys_path in /sys/block/nvme*n1; do
                [ -e "$sys_path" ] || continue
                model=$(cat "$sys_path/device/model" 2>/dev/null | xargs)
                case "$model" in *"Elastic Block Store"*) ;; *) continue ;; esac
                dev="/dev/$(basename "$sys_path")"
                if [ "$(lsblk -no NAME "$dev" | wc -l)" -eq 1 ] && [ -z "$(lsblk -no FSTYPE "$dev" | xargs)" ]; then
                  DATA_DISK="$dev"; break 2
                fi
              done
              echo "waiting for EBS data disk... ($i/60)"; sleep 1
            done
            if [ -n "$DATA_DISK" ]; then
              mkfs.xfs -f "$DATA_DISK"
              mkdir -p /data
              mount -o noatime "$DATA_DISK" /data
              UUID=$(blkid -s UUID -o value "$DATA_DISK")
              grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /data xfs defaults,noatime,nofail 0 2" >> /etc/fstab
              mkdir -p /data/models /data/logs /data/cache
              chmod 1777 /data
            else
              echo "WARN: EBS data disk not found; /data unavailable"
            fi

            echo "=== [2/4] install local-disk self-heal service (rebuild RAID0 + bind docker/containerd every boot) ==="
            # mdadm 是 RAID 硬前置; 开机初期网络可能未就绪(多网卡下无公网 IP 时更甚), 带重试
            for i in $(seq 1 30); do
              command -v mdadm >/dev/null && break
              dnf install -y mdadm && break
              echo "waiting for network to install mdadm... ($i/30)"; sleep 10
            done
            command -v mdadm >/dev/null || echo "FATAL: mdadm unavailable after retries; setup-local-disks.service will fail closed"
            echo '' | base64 -d > /usr/local/sbin/setup-local-disks.sh
            chmod +x /usr/local/sbin/setup-local-disks.sh
            cat > /etc/systemd/system/setup-local-disks.service <<'UNIT'
            [Unit]
            Description=Rebuild local NVMe RAID0 and bind docker/containerd data dirs (self-heal on every boot)
            DefaultDependencies=no
            Wants=systemd-udev-settle.service
            After=systemd-udev-settle.service local-fs.target
            Before=docker.service containerd.service
            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/local/sbin/setup-local-disks.sh
            StandardOutput=journal+console
            StandardError=journal+console
            [Install]
            WantedBy=multi-user.target
            UNIT
            systemctl daemon-reload
            systemctl enable setup-local-disks.service
            systemctl start setup-local-disks.service

            echo "=== [3/4] EFA userspace ${EfaInstallerVersion} ==="
            if [ ! -x /opt/amazon/efa/bin/fi_info ] || ! /opt/amazon/efa/bin/fi_info --version | grep -q "${EfaInstallerVersion}"; then
              cd /tmp
              curl -fsSLO "https://efa-installer.amazonaws.com/aws-efa-installer-${EfaInstallerVersion}.tar.gz"
              tar -xf "aws-efa-installer-${EfaInstallerVersion}.tar.gz"
              cd aws-efa-installer
              ./efa_installer.sh -y --skip-kmod 2>&1 | tail -20 || echo "WARN: efa_installer failed"
            fi
            /opt/amazon/efa/bin/fi_info -p efa -l || echo "WARN: no EFA devices visible yet"

            echo "=== [4/4] container runtime: nvidia runtime for docker+containerd (data dirs already bound to RAID) ==="
            command -v nvidia-ctk >/dev/null || dnf install -y nvidia-container-toolkit || true
            nvidia-ctk runtime configure --runtime=docker --set-as-default 2>/dev/null || true
            nvidia-ctk runtime configure --runtime=containerd --set-as-default 2>/dev/null || true
            systemctl enable docker containerd 2>/dev/null || true
            systemctl restart containerd 2>/dev/null || true
            systemctl restart docker 2>/dev/null || true
            nvidia-smi -pm 1 || true

            echo "=== p5en bootstrap complete ==="

  # -------------------------------------------------------------
  # Instances (CFN has no count; instances gated by InstanceCount)
  # Node1/2 always; 3/4 at >=4; 5/6 at >=6; 7/8 at 8
  # -------------------------------------------------------------
  # 注意: CloudFormation 不支持 YAML 锚点, 每台实例显式声明
  Node1:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-1' }
  Node2:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-2' }
  Node3:
    Type: AWS::EC2::Instance
    Condition: Create3
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-3' }
  Node4:
    Type: AWS::EC2::Instance
    Condition: Create3
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-4' }
  Node5:
    Type: AWS::EC2::Instance
    Condition: Create5
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-5' }
  Node6:
    Type: AWS::EC2::Instance
    Condition: Create5
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-6' }
  Node7:
    Type: AWS::EC2::Instance
    Condition: Create7
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-7' }
  Node8:
    Type: AWS::EC2::Instance
    Condition: Create7
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: !Sub '${ClusterName}-p5en-8' }

Outputs:
  SecurityGroupId:
    Value: !Ref NodeSecurityGroup
  LaunchTemplateId:
    Value: !Ref NodeLaunchTemplate
  PlacementGroup:
    Value: !Ref ClusterPlacementGroup
  Node1PrivateIp:
    Value: !GetAtt Node1.PrivateIp
  Node2PrivateIp:
    Value: !GetAtt Node2.PrivateIp
  Node3PrivateIp:
    Condition: Create3
    Value: !GetAtt Node3.PrivateIp
  Node4PrivateIp:
    Condition: Create3
    Value: !GetAtt Node4.PrivateIp
  Node5PrivateIp:
    Condition: Create5
    Value: !GetAtt Node5.PrivateIp
  Node6PrivateIp:
    Condition: Create5
    Value: !GetAtt Node6.PrivateIp
  Node7PrivateIp:
    Condition: Create7
    Value: !GetAtt Node7.PrivateIp
  Node8PrivateIp:
    Condition: Create7
    Value: !GetAtt Node8.PrivateIp
